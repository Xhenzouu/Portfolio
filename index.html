  <!DOCTYPE html>
  <html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Henson Brix A. Arroyo — Full-Stack Developer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Playfair Display', 'serif'],
            },
          },
        },
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"/>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>

  <body class="min-h-screen bg-[#0a0a0d] text-gray-200">

    <div class="cursor"></div>

    <!-- HEADER -->
    <header id="header" class="mt-32 pt-56 pb-32 px-6 lg:mt-40 lg:pt-80 lg:pb-40 hero-animate">
      <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">
        <div id="header-left"></div>
        <div id="header-right"></div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-32">

      <section id="skills" class="my-40 relative overflow-hidden">
        <h2 class="section-title" data-aos="fade-up">Technical Skills</h2>
        <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center">
          <div id="skills-left"></div>
          <div id="skills-right" class="flex justify-center"></div>
        </div>
      </section>

      <section id="projects" class="my-40">
        <h2 class="section-title" data-aos="fade-up">Featured Projects</h2>
        <div class="projects-grid" id="projects-grid"></div>
      </section>

      <section id="about" class="my-40 max-w-6xl mx-auto">
        <h2 class="section-title mb-12" data-aos="fade-up">
          Certifications
        </h2>

        <!-- Remove gap on mobile (gap-0 md:gap-16) -->
        <div class="grid md:grid-cols-2 gap-0 md:gap-16">
          <div id="about-left"></div>
          <div id="about-right"></div>
        </div>
      </section>

      <section id="education" class="my-20">
        <h2 class="section-title" data-aos="fade-up">Education</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl mx-auto" id="education-grid"></div>
      </section>

      <footer id="footer" class="text-center py-20 border-t border-purple-900/30 mt-40"></footer>
    </main>

    <script type="module" src="js/script.js"></script>

    <div id="cert-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">

      <div class="relative w-full max-w-5xl bg-[#0f0f14] rounded-2xl p-6 overflow-auto max-h-[90vh]">

        <!-- CLOSE BUTTON (back inside, top-right of modal box) -->
        <button
          onclick="closeCertModal()"
          class="absolute top-4 right-4 text-white text-2xl hover:text-purple-400 transition"
        >
          ✕
        </button>

        <!-- LEFT ARROW -->
        <button
          onclick="prevCert()"
          class="absolute left-2 top-1/2 -translate-y-1/2 text-white text-3xl hover:text-purple-400 transition"
        >
          ‹
        </button>

        <!-- RIGHT ARROW -->
        <button
          onclick="nextCert()"
          class="absolute right-2 top-1/2 -translate-y-1/2 text-white text-3xl hover:text-purple-400 transition"
        >
          ›
        </button>

        <div class="grid md:grid-cols-2 gap-8">

          <!-- IMAGE -->
          <div class="flex justify-center items-center h-[420px] bg-black/20 rounded-lg">
            <img
              id="cert-image"
              alt="Certification preview"
              title="Certification preview"
              class="max-h-full max-w-full object-contain rounded-lg shadow-xl"
            />
          </div>

          <!-- DETAILS -->
          <div>
            <h3 id="cert-title" class="text-2xl font-bold mb-2"></h3>
            <p id="cert-issuer" class="text-purple-300 mb-1"></p>
            <p id="cert-level" class="text-sm opacity-70 mb-4"></p>

            <div id="cert-dates" class="text-xs opacity-60 mb-6"></div>

            <h4 class="text-lg font-semibold mb-3 text-purple-400">
              Key Highlights
            </h4>

            <ul id="cert-highlights" class="space-y-2 text-sm text-gray-300 list-disc pl-5"></ul>
          </div>

        </div>
      </div>
    </div>
  </body>
  </html>
